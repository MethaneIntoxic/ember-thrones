name: Deploy Client To GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - apps/client/**
      - packages/shared/**
      - package.json
      - package-lock.json
      - .github/workflows/deploy.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install Dependencies
        run: npm ci

      - name: Resolve Vite Base Path
        id: basepath
        shell: bash
        run: |
          repo_name="${{ github.event.repository.name }}"
          owner_name="${{ github.repository_owner }}"

          if [[ "$repo_name" == "$owner_name.github.io" ]]; then
            echo "vite_base_path=/" >> "$GITHUB_OUTPUT"
          else
            echo "vite_base_path=/$repo_name/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Client For GitHub Pages
        env:
          VITE_BASE_PATH: ${{ steps.basepath.outputs.vite_base_path }}
        run: npm run mobile:pwa:build

      - name: Add SPA 404 Fallback
        run: cp apps/client/dist/index.html apps/client/dist/404.html

      - name: Add .nojekyll
        run: touch apps/client/dist/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/client/dist

      - name: Deploy To GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
